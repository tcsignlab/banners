<!DOCTYPE html>
<html>
<head>
  <title>Stage Banner Tool</title>
  <style>
    body { font-family: Arial; background:#111; color:#eee; }
    .panel { padding:16px; background:#1b1b1b; margin-bottom:12px; border-radius:8px; }
    .form-group { margin-bottom:10px; }
    label { display:block; font-size:12px; margin-bottom:4px; }
    input, select { width:100%; padding:6px; }
    button { padding:10px 14px; margin-top:10px; cursor:pointer; }
    canvas { background:#000; border:1px solid #333; margin-top:10px; }
  </style>
</head>
<body>

<div class="panel">
  <h2>Stage Config</h2>

  <div class="form-group">
    <label>Stage Width</label>
    <input id="stageW" value="40">
  </div>

  <div class="form-group">
    <label>Stage Height</label>
    <input id="stageH" value="20">
  </div>

  <div class="form-group">
    <label>Roof Height</label>
    <input id="roofH" value="30">
  </div>

  <div class="form-group">
    <label>Wing Width</label>
    <input id="wingW" value="10">
  </div>

  <div class="form-group">
    <label>Wing Height</label>
    <input id="wingH" value="25">
  </div>
</div>

<div class="panel">
  <h2>Banners</h2>
  <div id="banners"></div>
  <button onclick="addBanner()">Add Banner</button>
</div>

<button onclick="generate()">Generate</button>

<canvas id="front" width="600" height="300"></canvas>
<canvas id="isoL" width="600" height="300"></canvas>
<canvas id="isoR" width="600" height="300"></canvas>

<script>
let bannerId = 0;

function addBanner() {
  const id = bannerId++;

  const div = document.createElement("div");
  div.className = "panel";
  div.innerHTML = `
    <div class="form-group">
      <label>Width</label>
      <input id="bw-${id}" value="30">
    </div>

    <div class="form-group">
      <label>Height</label>
      <input id="bh-${id}" value="5">
    </div>

    <div class="form-group">
      <label>Location</label>
      <select id="bloc-${id}">
        <option value="top">Top</option>
        <option value="left">Left Wing</option>
        <option value="right">Right Wing</option>
      </select>
    </div>

    <div class="form-group">
      <label>Top Banner Mode</label>
      <select id="bmode-${id}">
        <option value="between">Between Wings</option>
        <option value="full">Full Width</option>
      </select>
    </div>
  `;
  document.getElementById("banners").appendChild(div);
}

function getConfig() {
  return {
    stageW: +stageW.value,
    stageH: +stageH.value,
    roofH: +roofH.value,
    wingW: +wingW.value,
    wingH: +wingH.value,
    banners: getBanners()
  };
}

function getBanners() {
  const result = [];

  for (let i = 0; i < bannerId; i++) {
    if (!document.getElementById(`bw-${i}`)) continue;

    result.push({
      w: +document.getElementById(`bw-${i}`).value,
      h: +document.getElementById(`bh-${i}`).value,
      loc: document.getElementById(`bloc-${i}`).value,
      mode: document.getElementById(`bmode-${i}`).value
    });
  }
  return result;
}

function generate() {
  const cfg = getConfig();
  drawFront(cfg);
  drawIso(cfg, "isoL");
  drawIso(cfg, "isoR");
}

function drawFront(cfg) {
  const c = front;
  const ctx = c.getContext("2d");
  ctx.clearRect(0,0,c.width,c.height);

  const totalW = cfg.stageW + cfg.wingW*2;
  const scale = c.width / totalW;

  const fx = x => x * scale;
  const fy = y => c.height - y * scale;

  const wL = cfg.wingW;

  // stage
  ctx.strokeStyle="#888";
  ctx.strokeRect(fx(wL), fy(cfg.stageH), cfg.stageW*scale, cfg.stageH*scale);

  // wings
  ctx.strokeRect(fx(0), fy(cfg.wingH), cfg.wingW*scale, cfg.wingH*scale);
  ctx.strokeRect(fx(wL+cfg.stageW), fy(cfg.wingH), cfg.wingW*scale, cfg.wingH*scale);

  // banners
  cfg.banners.forEach(b => {
    let bw, bh, bx, by;

    if (b.loc === "top") {
      bh = b.h * scale;

      if (b.mode === "between") {
        bw = cfg.stageW * scale;
        bx = fx(wL);
      } else {
        bw = (cfg.stageW + cfg.wingW*2) * scale;
        bx = fx(0);
      }

      by = fy(cfg.roofH) - bh;
    }

    if (b.loc === "left") {
      bw = cfg.wingW * scale;
      bh = b.h * scale;
      bx = fx(0);
      by = fy(cfg.wingH);
    }

    if (b.loc === "right") {
      bw = cfg.wingW * scale;
      bh = b.h * scale;
      bx = fx(wL + cfg.stageW);
      by = fy(cfg.wingH);
    }

    ctx.fillStyle="rgba(255,221,68,0.2)";
    ctx.strokeStyle="#ffdd44";
    ctx.fillRect(bx,by,bw,bh);
    ctx.strokeRect(bx,by,bw,bh);
  });
}

function drawIso(cfg, canvasId) {
  const c = document.getElementById(canvasId);
  const ctx = c.getContext("2d");
  ctx.clearRect(0,0,c.width,c.height);

  const scale = 8;
  const fx = x => x * scale;
  const fy = y => c.height - y * scale;

  const wL = cfg.wingW;

  // stage box
  ctx.strokeStyle="#888";
  ctx.strokeRect(fx(wL), fy(cfg.stageH), cfg.stageW*scale, cfg.stageH*scale);

  // wings
  ctx.strokeRect(fx(0), fy(cfg.wingH), cfg.wingW*scale, cfg.wingH*scale);
  ctx.strokeRect(fx(wL+cfg.stageW), fy(cfg.wingH), cfg.wingW*scale, cfg.wingH*scale);

  // banners (ISO simplified)
  cfg.banners.forEach(b => {
    let bw, bh, bx, by;
    const depth = 0.6;

    if (b.loc === "top") {
      bh = b.h * scale * depth;

      if (b.mode === "between") {
        bw = cfg.stageW * scale;
        bx = fx(wL);
      } else {
        bw = (cfg.stageW + cfg.wingW*2) * scale;
        bx = fx(0);
      }

      by = fy(cfg.roofH);
    }

    if (b.loc === "left") {
      bw = cfg.wingW * scale * depth;
      bh = b.h * scale;
      bx = fx(0);
      by = fy(cfg.wingH);
    }

    if (b.loc === "right") {
      bw = cfg.wingW * scale * depth;
      bh = b.h * scale;
      bx = fx(wL + cfg.stageW);
      by = fy(cfg.wingH);
    }

    ctx.fillStyle="rgba(255,221,68,0.2)";
    ctx.strokeStyle="#ffdd44";
    ctx.fillRect(bx,by,bw,bh);
    ctx.strokeRect(bx,by,bw,bh);
  });
}
</script>

</body>
</html>
