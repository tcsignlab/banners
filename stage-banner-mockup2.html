<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stage Banner Mockup Generator</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #f78166;
    --text: #e6edf3;
    --muted: #8b949e;
    --blueprint-bg: #0a1628;
    --blueprint-line: #4a9eff;
    --blueprint-dim: #a8d4ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', monospace;
    min-height: 100vh;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
  }
  header span {
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 1px;
  }
  .layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    min-height: calc(100vh - 57px);
  }
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 20px;
    overflow-y: auto;
  }
  .sidebar h2 {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .form-group {
    margin-bottom: 14px;
  }
  .form-group label {
    display: block;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    border-radius: 4px;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .section-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    margin: 20px 0 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .banner-entry {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 10px;
    position: relative;
  }
  .banner-entry .banner-title {
    font-size: 11px;
    color: var(--accent2);
    letter-spacing: 1px;
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .remove-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 0;
    line-height: 1;
  }
  .remove-btn:hover { color: var(--accent2); }
  .btn {
    display: block;
    width: 100%;
    padding: 10px;
    background: var(--accent);
    color: #000;
    border: none;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    margin-bottom: 8px;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn.secondary {
    background: var(--surface);
    color: var(--accent);
    border: 1px solid var(--accent);
  }
  .btn.generate {
    background: linear-gradient(135deg, #1f6feb, #58a6ff);
    margin-top: 20px;
    padding: 14px;
    font-size: 13px;
  }
  .btn.export {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    margin-top: 4px;
  }
  .main {
    padding: 24px;
    overflow-y: auto;
  }
  .views-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }
  .view-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .view-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .view-header h3 {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .view-badge {
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--accent);
    background: rgba(88,166,255,0.1);
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid rgba(88,166,255,0.2);
  }
  .canvas-wrap {
    background: var(--blueprint-bg);
    position: relative;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 100%;
    height: auto;
  }
  .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 280px;
    color: var(--muted);
    gap: 12px;
  }
  .placeholder svg { opacity: 0.3; }
  .placeholder p { font-size: 12px; letter-spacing: 1px; }

  .download-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 16px;
  }
  .download-row .btn { margin: 0; font-size: 11px; }
</style>
</head>
<body>

<header>
  <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
    <rect x="2" y="10" width="24" height="14" stroke="#58a6ff" stroke-width="1.5"/>
    <line x1="2" y1="10" x2="2" y2="4" stroke="#58a6ff" stroke-width="1.5"/>
    <line x1="26" y1="10" x2="26" y2="4" stroke="#58a6ff" stroke-width="1.5"/>
    <line x1="2" y1="4" x2="26" y2="4" stroke="#58a6ff" stroke-width="1.5"/>
    <line x1="8" y1="10" x2="8" y2="4" stroke="#58a6ff" stroke-width="1"/>
    <line x1="20" y1="10" x2="20" y2="4" stroke="#58a6ff" stroke-width="1"/>
    <circle cx="5" cy="7" r="1.5" fill="#f78166"/>
    <circle cx="23" cy="7" r="1.5" fill="#f78166"/>
  </svg>
  <h1>Stage Banner Mockup Generator</h1>
  <span>// engineering blueprint</span>
</header>

<div class="layout">
  <div class="sidebar">
    <h2>Job Information</h2>
    <div class="form-group">
      <label>Job Name</label>
      <input type="text" id="jobName" value="YOUR EVENT NAME" onchange="generateAll()">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="jobDesc" rows="2" onchange="generateAll()">Stage banner layout</textarea>
    </div>

    <h2>Stage Configuration</h2>

    <div class="section-label">Stage Dimensions</div>
    <div class="form-row">
      <div class="form-group">
        <label>Stage Width (ft)</label>
        <input type="number" id="stageW" value="40" min="10" max="200" onchange="generateAll()">
      </div>
      <div class="form-group">
        <label>Stage Depth (ft)</label>
        <input type="number" id="stageD" value="20" min="8" max="100" onchange="generateAll()">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Stage Height (ft)</label>
        <input type="number" id="stageH" value="4" min="2" max="12" onchange="generateAll()">
      </div>
      <div class="form-group">
        <label>Roof Height (ft)</label>
        <input type="number" id="roofH" value="24" min="12" max="60" onchange="generateAll()">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Wing Width (ft)</label>
        <input type="number" id="wingW" value="8" min="4" max="30" onchange="generateAll()">
      </div>
      <div class="form-group">
        <label>Wing Height (ft)</label>
        <input type="number" id="wingH" value="16" min="8" max="40" onchange="generateAll()">
      </div>
    </div>

    <div class="section-label">Banner Zones</div>
    <div id="banners"></div>
    <button class="btn secondary" onclick="addBanner()">+ Add Banner Zone</button>

    <button class="btn generate" onclick="generateAll()">⚡ Generate Mockups</button>

    <div class="download-row">
      <button class="btn export" onclick="downloadCanvas('cvFront','blueprint-front')">↓ Front</button>
      <button class="btn export" onclick="downloadCanvas('cvIsoLeft','blueprint-iso-left')">↓ ISO Left</button>
      <button class="btn export" onclick="downloadCanvas('cvIsoRight','blueprint-iso-right')">↓ ISO Right</button>
    </div>
    <button class="btn export" onclick="printViews()">🖨️ Print All (B&amp;W)</button>
    <button class="btn export" onclick="togglePrintMode()">🖨️ Toggle Print Mode (White BG)</button>
  </div>

  <div class="main">
    <div class="views-grid">
      <div class="view-card">
        <div class="view-header">
          <h3>Front Elevation</h3>
          <span class="view-badge">BLUEPRINT</span>
        </div>
        <div class="canvas-wrap" id="wrapFront">
          <div class="placeholder" id="phFront">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect x="4" y="14" width="40" height="26" stroke="#8b949e" stroke-width="1.5"/><line x1="4" y1="14" x2="4" y2="8" stroke="#8b949e" stroke-width="1.5"/><line x1="44" y1="14" x2="44" y2="8" stroke="#8b949e" stroke-width="1.5"/><line x1="4" y1="8" x2="44" y2="8" stroke="#8b949e" stroke-width="1.5"/></svg>
            <p>Configure & Generate</p>
          </div>
          <canvas id="cvFront" style="display:none"></canvas>
        </div>
      </div>

      <div class="view-card">
        <div class="view-header">
          <h3>ISO Left View</h3>
          <span class="view-badge">BLUEPRINT</span>
        </div>
        <div class="canvas-wrap" id="wrapIsoLeft">
          <div class="placeholder" id="phIsoLeft">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect x="4" y="14" width="40" height="26" stroke="#8b949e" stroke-width="1.5" transform="skewX(-15)"/></svg>
            <p>Configure & Generate</p>
          </div>
          <canvas id="cvIsoLeft" style="display:none"></canvas>
        </div>
      </div>

      <div class="view-card">
        <div class="view-header">
          <h3>ISO Right View</h3>
          <span class="view-badge">BLUEPRINT</span>
        </div>
        <div class="canvas-wrap" id="wrapIsoRight">
          <div class="placeholder" id="phIsoRight">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect x="4" y="14" width="40" height="26" stroke="#8b949e" stroke-width="1.5" transform="skewX(15)"/></svg>
            <p>Configure & Generate</p>
          </div>
          <canvas id="cvIsoRight" style="display:none"></canvas>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── Banner management ───────────────────────────────────────────────────────
let bannerCount = 0;
let printMode = false;

const bannerPresets = [
  { name: 'Front Main', w: 23.5, h: 12.67, loc: 'front' },
  { name: 'Top Header', w: 36.75, h: 3.67, loc: 'top', span: 'full' },
  { name: 'Left Wing', w: 6, h: 16, loc: 'left' },
  { name: 'Right Wing', w: 6, h: 16, loc: 'right' },
];

function addBanner(preset) {
  const id = ++bannerCount;
  const p = preset || { name: `Banner ${id}`, w: 10, h: 8, loc: 'front', span: 'stage' };
  const div = document.createElement('div');
  div.className = 'banner-entry';
  div.id = `banner-${id}`;
  div.innerHTML = `
    <div class="banner-title">▪ ${p.name}</div>
    <button class="remove-btn" onclick="this.parentElement.remove(); generateAll()">×</button>
    <div class="form-row">
      <div class="form-group"><label>Width (ft)</label><input type="number" id="bw-${id}" value="${p.w}" step="0.25" min="1" onchange="generateAll()"></div>
      <div class="form-group"><label>Height (ft)</label><input type="number" id="bh-${id}" value="${p.h}" step="0.25" min="1" onchange="generateAll()"></div>
    </div>
    <div class="form-group">
      <label>Location</label>
      <select id="bloc-${id}" onchange="generateAll()">
        <option value="front" ${p.loc==='front'?'selected':''}>Front (main backdrop)</option>
        <option value="top" ${p.loc==='top'?'selected':''}>Top header</option>
        <option value="left" ${p.loc==='left'?'selected':''}>Left wing</option>
        <option value="right" ${p.loc==='right'?'selected':''}>Right wing</option>
      </select>
    </div>
    ${p.loc === 'top' ? `
    <div class="form-group">
      <label>Span</label>
      <select id="bspan-${id}" onchange="generateAll()">
        <option value="stage" ${p.span==='stage'?'selected':''}>Between wings</option>
        <option value="full" ${p.span==='full'?'selected':''}>Full width</option>
      </select>
    </div>` : ''}
    <div class="form-group"><label>Label / Name</label><input type="text" id="blabel-${id}" value="${p.name}" onchange="generateAll()"></div>
  `;
  document.getElementById('banners').appendChild(div);
}

function getBanners() {
  const result = [];
  document.querySelectorAll('.banner-entry').forEach(el => {
    const id = el.id.split('-')[1];
    const loc = document.getElementById(`bloc-${id}`)?.value || 'front';
    result.push({
      w: parseFloat(document.getElementById(`bw-${id}`)?.value || 0),
      h: parseFloat(document.getElementById(`bh-${id}`)?.value || 0),
      loc: loc,
      span: loc === 'top' ? (document.getElementById(`bspan-${id}`)?.value || 'full') : 'stage',
      label: document.getElementById(`blabel-${id}`)?.value || '',
    });
  });
  return result;
}

// Pre-populate
bannerPresets.forEach(p => addBanner(p));

// Generate
function generateAll() {
  const cfg = {
    stageW: parseFloat(document.getElementById('stageW').value),
    stageD: parseFloat(document.getElementById('stageD').value),
    stageH: parseFloat(document.getElementById('stageH').value),
    roofH: parseFloat(document.getElementById('roofH').value),
    wingW: parseFloat(document.getElementById('wingW').value),
    wingH: parseFloat(document.getElementById('wingH').value),
    banners: getBanners(),
    jobName: document.getElementById('jobName').value || 'EVENT',
    jobDesc: document.getElementById('jobDesc').value || '',
  };

  drawBlueprintFront(cfg);
  drawBlueprintIsoLeft(cfg);
  drawBlueprintIsoRight(cfg);
}

function togglePrintMode() {
  printMode = !printMode;
  generateAll();
}

// Print
function printViews() {
  const printWin = window.open('', '_blank');
  printWin.document.write(`
    <html><head><title>Stage Banner Blueprints</title>
    <style>
      @page { size: landscape; margin: 0.4in; }
      body { font-family: 'Courier New', monospace; margin:0; padding:10px; background:white; color:black; }
      .view { page-break-after: always; margin-bottom: 20px; }
      img { max-width: 100%; height: auto; border: 1px solid #000; }
      h2 { text-align: center; margin: 10px 0; }
    </style>
    </head><body>
  `);
  ['cvFront','cvIsoLeft','cvIsoRight'].forEach((id, i) => {
    const cv = document.getElementById(id);
    if (cv.style.display !== 'none') {
      printWin.document.write(`<div class="view"><h2>${['Front Elevation','ISO Left View','ISO Right View'][i]}</h2><img src="${cv.toDataURL('image/png')}"></div>`);
    }
  });
  printWin.document.write('</body></html>');
  printWin.document.close();
  setTimeout(() => printWin.print(), 600);
}

function showCanvas(canvasId, phId) {
  document.getElementById(phId).style.display = 'none';
  const cv = document.getElementById(canvasId);
  cv.style.display = 'block';
  return cv;
}

// BLUEPRINT helpers
const BP = {
  bg: '#0a1628',
  line: '#4a9eff',
  dimLine: '#a8d4ff',
  dimText: '#c8e4ff',
  banner: '#ffdd44',
  labelColor: '#7fbfff',
  grid: 'rgba(74,158,255,0.08)',
  trussX: '#2a5a9a',
};

function getColors(isPrint) {
  if (!isPrint) return {
    bg: '#0a1628',
    line: '#4a9eff',
    dimLine: '#a8d4ff',
    dimText: '#c8e4ff',
    grid: 'rgba(74,158,255,0.08)',
    bannerFront: 'rgba(255,80,80,0.2)',
    bannerTop: 'rgba(80,220,150,0.25)',   // green for top
    bannerWing: 'rgba(80,220,150,0.2)',
    strokeFront: '#ff5050',
    strokeTop: '#50dc96',
    strokeWing: '#50dc96'
  };
  return {
    bg: '#ffffff',
    line: '#000000',
    dimLine: '#000000',
    dimText: '#000000',
    grid: 'rgba(0,0,0,0.08)',
    bannerFront: 'rgba(200,200,200,0.6)',
    bannerTop: 'rgba(180,240,180,0.6)',
    bannerWing: 'rgba(180,240,180,0.6)',
    strokeFront: '#000000',
    strokeTop: '#000000',
    strokeWing: '#000000'
  };
}

function setupCanvas(canvasId, w, h) {
  const cv = document.getElementById(canvasId);
  cv.width = w; cv.height = h;
  return cv.getContext('2d');
}

function drawGrid(ctx, w, h, scale, ft = 5, colors) {
  ctx.strokeStyle = colors.grid;
  ctx.lineWidth = 0.5;
  const step = ft * scale;
  for (let x = 0; x < w; x += step) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
  for (let y = 0; y < h; y += step) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }
}

function drawDim(ctx, x1, y1, x2, y2, label, offset=18, colors) {
  const dx = x2-x1, dy = y2-y1;
  const len = Math.sqrt(dx*dx+dy*dy) || 1;
  const nx = -dy/len*offset, ny = dx/len*offset;
  ctx.strokeStyle = colors.dimLine; ctx.lineWidth = 0.8; ctx.setLineDash([4,3]);
  ctx.beginPath(); ctx.moveTo(x1+nx,y1+ny); ctx.lineTo(x2+nx,y2+ny); ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x1+nx,y1+ny); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x2,y2); ctx.lineTo(x2+nx,y2+ny); ctx.stroke();
  const ang = Math.atan2(dy,dx);
  const mx = (x1+x2)/2+nx, my = (y1+y2)/2+ny;
  ctx.fillStyle = colors.dimLine;
  drawArrow(ctx, mx, my, ang, 6);
  ctx.fillStyle = colors.dimText;
  ctx.font = '10px Courier New';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const lx = mx+ny*0.5, ly = my-nx*0.5;
  ctx.save(); ctx.translate(lx,ly); ctx.rotate(ang); ctx.fillText(label,0,-5); ctx.restore();
}

function drawArrow(ctx, x, y, ang, size) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(ang);
  ctx.beginPath(); ctx.moveTo(-size,-size/2); ctx.lineTo(0,0); ctx.lineTo(-size,size/2); ctx.fill();
  ctx.restore();
}

function drawTrussSegment(ctx, x1,y1,x2,y2,thick=8, colors) {
  const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy)||1;
  const nx=-dy/len*(thick/2),ny=dx/len*(thick/2);
  ctx.strokeStyle=colors.line; ctx.lineWidth=1.5; ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(x1+nx,y1+ny); ctx.lineTo(x2+nx,y2+ny); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x1-nx,y1-ny); ctx.lineTo(x2-nx,y2-ny); ctx.stroke();
  ctx.strokeStyle=colors.line; ctx.lineWidth=0.8;
  const steps=Math.max(2,Math.round(len/20));
  for(let i=0;i<steps;i++){
    const t0=i/steps,t1=(i+1)/steps;
    const ax=x1+dx*t0,ay=y1+dy*t0;
    const bx=x1+dx*t1,by=y1+dy*t1;
    ctx.beginPath();
    if(i%2===0){ctx.moveTo(ax+nx,ay+ny);ctx.lineTo(bx-nx,by-ny);}
    else{ctx.moveTo(ax-nx,ay-ny);ctx.lineTo(bx+nx,by+ny);}
    ctx.stroke();
  }
}

function drawBlueprintFront(cfg) {
  const PAD = 80, W = 900, H = 550;
  const ctx = setupCanvas('cvFront', W, H);
  showCanvas('cvFront','phFront');
  const colors = getColors(printMode);

  ctx.fillStyle = colors.bg; ctx.fillRect(0,0,W,H);
  drawGrid(ctx,W,H,10,5,colors);

  ctx.fillStyle = colors.line; ctx.font = 'bold 11px Courier New';
  ctx.fillText('FRONT ELEVATION  —  SCALE: NTS', PAD, 22);
  ctx.fillStyle = colors.dimText; ctx.font = '10px Courier New';
  ctx.fillText(`${cfg.jobName} | ${cfg.jobDesc}`, PAD, 36);
  ctx.fillText(`STAGE: ${cfg.stageW}' W × ${cfg.stageD}' D × ${cfg.stageH}' H   ROOF: ${cfg.roofH}' H`, PAD, 50);

  const totalW = cfg.stageW + cfg.wingW * 2;
  const totalH = cfg.roofH;
  const scaleX = (W - PAD*2) / totalW;
  const scaleY = (H - PAD*2 - 60) / totalH;
  const scale = Math.min(scaleX, scaleY);

  const ox = PAD + (W - PAD*2 - totalW*scale)/2;
  const oy = H - PAD;

  function fx(ft) { return ox + ft*scale; }
  function fy(ft) { return oy - ft*scale; }

  ctx.strokeStyle = colors.line; ctx.lineWidth = 1; ctx.setLineDash([6,3]);
  ctx.beginPath(); ctx.moveTo(PAD/2,oy); ctx.lineTo(W-PAD/2,oy); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = colors.dimText; ctx.font='9px Courier New'; ctx.fillText('GL ±0',PAD/2-5,oy-3);

  const wL = cfg.wingW, wR = cfg.stageW + cfg.wingW;
  const stageTop = cfg.stageH;
  const wingTop = cfg.stageH + cfg.wingH;

  ctx.strokeStyle = colors.line; ctx.lineWidth = 2;
  ctx.strokeRect(fx(wL), fy(stageTop), cfg.stageW*scale, stageTop*scale);
  ctx.fillStyle = 'rgba(100,100,255,0.05)'; ctx.fillRect(fx(wL), fy(stageTop), cfg.stageW*scale, stageTop*scale);

  ctx.strokeStyle = 'rgba(100,100,255,0.15)'; ctx.lineWidth = 0.5;
  for(let x=0;x<cfg.stageW*scale;x+=12){
    ctx.beginPath(); ctx.moveTo(fx(wL)+x, fy(stageTop)); ctx.lineTo(fx(wL)+x, oy); ctx.stroke();
  }

  drawTrussSegment(ctx, fx(wL), fy(cfg.roofH), fx(wR), fy(cfg.roofH), 10, colors);

  drawTrussSegment(ctx, fx(0), fy(0), fx(0), fy(cfg.roofH+1), 10, colors);
  drawTrussSegment(ctx, fx(wL), fy(stageTop), fx(wL), fy(cfg.roofH), 8, colors);

  drawTrussSegment(ctx, fx(wR+cfg.wingW), fy(0), fx(wR+cfg.wingW), fy(cfg.roofH+1), 10, colors);
  drawTrussSegment(ctx, fx(wR), fy(stageTop), fx(wR), fy(cfg.roofH), 8, colors);

  ctx.strokeStyle = colors.line; ctx.lineWidth = 1.5;
  ctx.strokeRect(fx(0), fy(wingTop), wL*scale, wingTop*scale);
  ctx.strokeRect(fx(wR), fy(wingTop), cfg.wingW*scale, wingTop*scale);

  const spkSlots = 3;
  for(let i=0;i<spkSlots;i++){
    const sy = fy(cfg.stageH+(i+1)*(cfg.wingH/spkSlots));
    const sh = (cfg.wingH/spkSlots)*scale - 4;
    ctx.strokeStyle = 'rgba(100,100,255,0.5)'; ctx.lineWidth = 0.8;
    ctx.strokeRect(fx(0)+3, sy, wL*scale-6, sh);
    ctx.beginPath(); ctx.arc(fx(wL/2), sy+sh/2, sh*0.28, 0, Math.PI*2); ctx.stroke();
    ctx.strokeRect(fx(wR)+3, sy, cfg.wingW*scale-6, sh);
    ctx.beginPath(); ctx.arc(fx(wR+cfg.wingW/2), sy+sh/2, sh*0.28, 0, Math.PI*2); ctx.stroke();
  }

  // Banners
  cfg.banners.forEach((b, i) => {
    let col, str;
    if (b.loc === 'top') {
      col = colors.bannerTop;
      str = colors.strokeTop;
    } else if (b.loc === 'front') {
      col = colors.bannerFront;
      str = colors.strokeFront;
    } else {
      col = colors.bannerWing;
      str = colors.strokeWing;
    }

    let bx, by, bw, bh;
    if (b.loc === 'front') {
      const topBanner = cfg.banners.find(x => x.loc === 'top');
      const topH = topBanner ? topBanner.h : 0;
      const availH = cfg.roofH - topH - stageTop;
      const avail = cfg.stageW * 0.95;
      bw = Math.min(b.w, avail) * scale;
      bh = Math.min(b.h, availH) * scale;
      bx = fx(wL + (cfg.stageW - Math.min(b.w, avail)) / 2);
      const spaceTop = fy(cfg.roofH - topH);
      const spaceBot = fy(stageTop);
      by = spaceTop + (spaceBot - spaceTop - bh) / 2;
    } else if (b.loc === 'top') {
      const isFull = b.span === 'full';
      const bannerW = isFull ? totalW : cfg.stageW;
      const offsetX = isFull ? 0 : cfg.wingW;
      bw = bannerW * scale;
      bh = b.h * scale;
      bx = fx(offsetX);
      by = fy(cfg.roofH) - 2;
    } else if (b.loc === 'left') {
      bw = wL * scale;
      bh = Math.min(b.h, cfg.wingH) * scale;
      bx = fx(0);
      by = fy(stageTop + Math.min(b.h, cfg.wingH));
    } else if (b.loc === 'right') {
      bw = cfg.wingW * scale;
      bh = Math.min(b.h, cfg.wingH) * scale;
      bx = fx(wR);
      by = fy(stageTop + Math.min(b.h, cfg.wingH));
    }
    ctx.fillStyle = col; ctx.fillRect(bx, by, bw, bh);
    ctx.strokeStyle = str; ctx.lineWidth = 1.2; ctx.setLineDash([4,2]);
    ctx.strokeRect(bx, by, bw, bh);
    ctx.setLineDash([]);
    ctx.fillStyle = str; ctx.font = 'bold 9px Courier New'; ctx.textAlign = 'center';
    ctx.fillText(`${b.label || b.loc.toUpperCase()} — ${b.w}' × ${b.h}'`, bx+bw/2, by+bh/2);

    drawDim(ctx, bx, by+bh, bx+bw, by+bh, `${b.w}'`, 18, colors);
    drawDim(ctx, bx+bw, by, bx+bw, by+bh, `${b.h}'`, 18, colors);
  });

  drawDim(ctx, fx(0), oy+12, fx(totalW+cfg.wingW), oy+12, `TOTAL ${totalW+cfg.wingW}'`, -20, colors);
  drawDim(ctx, fx(wL), oy+30, fx(wR), oy+30, `STAGE ${cfg.stageW}'`, -20, colors);
  drawDim(ctx, fx(0)-30, fy(0), fx(0)-30, fy(cfg.roofH), `${cfg.roofH}' ROOF`, 0, colors);

  ctx.fillStyle = colors.dimText; ctx.font = '10px Courier New'; ctx.textAlign = 'left';
  ctx.fillText(`DWG: FRONT-ELV-01  |  ${new Date().toLocaleDateString()}`, PAD, H-12);
}

function drawIsometricStage(ctx, cfg, W, H, PAD, side, colors) {
  const flip = side==='right' ? -1 : 1;
  const isoAngle = Math.PI/6;
  const scaleAll = Math.min((W-PAD*2)/(cfg.stageW+cfg.stageD+cfg.wingW*2)/1.5,
                            (H-PAD*2)/(cfg.roofH+cfg.stageD*0.5)/1.2);

  const cx = side==='left' ? W*0.38 : W*0.62;
  const cy = H*0.75;

  function isoX(x,y,z){ return cx + flip*(x*Math.cos(isoAngle) - y*Math.cos(isoAngle))*scaleAll; }
  function isoY(x,y,z){ return cy - (z*scaleAll) - (x*Math.sin(isoAngle) + y*Math.sin(isoAngle))*scaleAll; }

  const sw = cfg.stageW, sd = cfg.stageD, sh = cfg.stageH;
  const ww = cfg.wingW, wh = cfg.stageH+cfg.wingH;
  const rh = cfg.roofH;

  function isoLine(x1,y1,z1,x2,y2,z2,style) {
    ctx.strokeStyle=style||colors.line; ctx.lineWidth=1.5; ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(isoX(x1,y1,z1),isoY(x1,y1,z1));
    ctx.lineTo(isoX(x2,y2,z2),isoY(x2,y2,z2));
    ctx.stroke();
  }
  function isoFace(pts, fill, stroke) {
    ctx.beginPath();
    ctx.moveTo(isoX(...pts[0]),isoY(...pts[0]));
    pts.slice(1).forEach(p=>ctx.lineTo(isoX(...p),isoY(...p)));
    ctx.closePath();
    if(fill){ctx.fillStyle=fill;ctx.fill();}
    if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=1.5;ctx.stroke();}
  }

  isoFace([[0,0,sh],[sw,0,sh],[sw,sd,sh],[0,sd,sh]],'rgba(74,158,255,0.08)',colors.line);
  isoFace([[0,0,0],[sw,0,0],[sw,0,sh],[0,0,sh]],'rgba(74,158,255,0.05)',colors.line);
  isoFace([[0,0,0],[0,sd,0],[0,sd,sh],[0,0,sh]],'rgba(74,158,255,0.07)',colors.line);

  // Both wings always
  isoFace([[-ww,0,0],[-ww,sd,0],[-ww,sd,wh],[-ww,0,wh]],'rgba(74,158,255,0.06)',colors.line);
  isoFace([[-ww,0,0],[0,0,0],[0,0,wh],[-ww,0,wh]],'rgba(74,158,255,0.04)',colors.line);
  isoFace([[-ww,0,wh],[0,0,wh],[0,sd,wh],[-ww,sd,wh]],'rgba(74,158,255,0.03)',colors.line);

  isoFace([[sw,0,0],[sw+ww,0,0],[sw+ww,0,wh],[sw,0,wh]],'rgba(74,158,255,0.04)',colors.line);
  isoFace([[sw+ww,0,0],[sw+ww,sd,0],[sw+ww,sd,wh],[sw+ww,0,wh]],'rgba(74,158,255,0.06)',colors.line);

  isoLine(0,0,rh,sw,0,rh);
  isoLine(0,sd,rh,sw,sd,rh);
  isoLine(0,0,rh,0,sd,rh);
  isoLine(sw,0,rh,sw,sd,rh);

  isoLine(-ww,0,0,-ww,0,rh+1);
  isoLine(sw+ww,0,0,sw+ww,0,rh+1);
  isoLine(0,0,sh,0,0,rh);
  isoLine(sw,0,sh,sw,0,rh);

  for(let i=0;i<4;i++){
    const t=i/4;
    isoLine(sw*t,0,rh,sw*(t+0.25),sd,rh,colors.line);
  }

  // Banners - both wings on every iso
  cfg.banners.forEach((b,i) => {
    let col, str;
    if (b.loc === 'top') {
      col = colors.bannerTop;
      str = colors.strokeTop;
    } else if (b.loc === 'front') {
      col = colors.bannerFront;
      str = colors.strokeFront;
    } else {
      col = colors.bannerWing;
      str = colors.strokeWing;
    }

    if(b.loc==='front'){
      const topBanner = cfg.banners.find(x => x.loc === 'top');
      const topH = topBanner ? topBanner.h : 0;
      const availH = rh - topH - sh;
      const banH = Math.min(b.h, availH);
      const midZ = sh + (availH - banH) / 2;
      const bx2=(sw-Math.min(b.w,sw))/2, bw2=Math.min(b.w,sw);
      isoFace([[bx2,sd,midZ],[bx2+bw2,sd,midZ],[bx2+bw2,sd,midZ+banH],[bx2,sd,midZ+banH]],col,str);
    } else if(b.loc==='left'){
      isoFace([[-ww,0,sh],[0,0,sh],[0,0,sh+Math.min(b.h,cfg.wingH)],[-ww,0,sh+Math.min(b.h,cfg.wingH)]],col,str);
    } else if(b.loc==='right'){
      isoFace([[sw,0,sh],[sw+ww,0,sh],[sw+ww,0,sh+Math.min(b.h,cfg.wingH)],[sw,0,sh+Math.min(b.h,cfg.wingH)]],col,str);
    } else if(b.loc==='top'){
      const isFull = b.span === 'full';
      const bannerW = isFull ? (sw + ww*2) : sw;
      const offsetX = isFull ? -ww : 0;
      const topZ = rh - b.h;
      isoFace([[offsetX, 0, topZ], [offsetX + bannerW, 0, topZ], [offsetX + bannerW, 0, rh], [offsetX, 0, rh]], col, str);
    }
  });
}

function drawBlueprintIsoLeft(cfg) {
  const W=900,H=500,PAD=80;
  const ctx = setupCanvas('cvIsoLeft',W,H);
  showCanvas('cvIsoLeft','phIsoLeft');
  const colors = getColors(printMode);
  ctx.fillStyle=colors.bg; ctx.fillRect(0,0,W,H);
  drawGrid(ctx,W,H,10,5,colors);
  ctx.fillStyle=colors.line; ctx.font='bold 11px Courier New';
  ctx.fillText('ISO LEFT VIEW  —  SCALE: NTS',PAD,22);
  ctx.fillText(`${cfg.jobName}`, PAD, 36);

  drawIsometricStage(ctx, cfg, W, H, PAD, 'left', colors);
  ctx.fillStyle=colors.dimText; ctx.font='10px Courier New'; ctx.textAlign='left';
  ctx.fillText(`DWG: ISO-LEFT-02  |  ${new Date().toLocaleDateString()}`,PAD,H-12);
}

function drawBlueprintIsoRight(cfg) {
  const W=900,H=500,PAD=80;
  const ctx = setupCanvas('cvIsoRight',W,H);
  showCanvas('cvIsoRight','phIsoRight');
  const colors = getColors(printMode);
  ctx.fillStyle=colors.bg; ctx.fillRect(0,0,W,H);
  drawGrid(ctx,W,H,10,5,colors);
  ctx.fillStyle=colors.line; ctx.font='bold 11px Courier New';
  ctx.fillText('ISO RIGHT VIEW  —  SCALE: NTS',PAD,22);
  ctx.fillText(`${cfg.jobName}`, PAD, 36);

  drawIsometricStage(ctx, cfg, W, H, PAD, 'right', colors);
  ctx.fillStyle=colors.dimText; ctx.font='10px Courier New'; ctx.textAlign='left';
  ctx.fillText(`DWG: ISO-RIGHT-03  |  ${new Date().toLocaleDateString()}`,PAD,H-12);
}

// Download
function downloadCanvas(id, name) {
  const cv = document.getElementById(id);
  if (cv.style.display === 'none') { alert('Generate mockups first!'); return; }
  const a = document.createElement('a');
  a.download = `${name}-${Date.now()}.png`;
  a.href = cv.toDataURL('image/png');
  a.click();
}
